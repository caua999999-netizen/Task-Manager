services:
  postgres:
    image: postgres:16
    container_name: task-manager-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskmanager
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: